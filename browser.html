<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a3a;
    --accent: #7c6fff;
    --accent2: #ff6f9c;
    --text: #e8e8f0;
    --muted: #666680;
    --tab-h: 38px;
    --bar-h: 52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  #shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
  }

  /* ── Tab bar ── */
  #tab-strip {
    display: flex;
    align-items: center;
    height: var(--tab-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 6px;
    gap: 4px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  #tab-strip::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    height: 28px;
    padding: 0 12px 0 10px;
    border-radius: 6px;
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.15s ease;
    flex-shrink: 0;
    max-width: 180px;
  }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active {
    background: var(--surface2);
    border-color: var(--border);
    color: var(--text);
  }
  .tab.active .tab-dot { background: var(--accent); }

  .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tab-close {
    width: 16px; height: 16px;
    border-radius: 4px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    transition: background 0.1s, color 0.1s;
  }
  .tab-close:hover { background: rgba(255,255,255,0.08); color: var(--accent2); }

  #new-tab-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  #new-tab-btn:hover { background: var(--surface2); color: var(--accent); border-color: var(--border); }

  /* ── Address bar ── */
  #nav-bar {
    display: flex;
    align-items: center;
    height: var(--bar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    gap: 10px;
    flex-shrink: 0;
  }

  .nav-btn {
    width: 32px; height: 32px;
    border-radius: 7px;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  #url-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0 14px;
    height: 36px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  #url-wrap:focus-within { border-color: var(--accent); }

  #url-icon {
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
  }

  #url-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    caret-color: var(--accent);
  }
  #url-input::placeholder { color: var(--muted); }

  #go-btn {
    height: 32px;
    padding: 0 16px;
    border-radius: 7px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #go-btn:hover { background: #9585ff; transform: translateY(-1px); }
  #go-btn:active { transform: translateY(0); }

  /* ── Viewport ── */
  #viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .tab-content {
    position: absolute;
    inset: 0;
    display: none;
  }
  .tab-content.active { display: flex; flex-direction: column; }

  .tab-iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

  /* ── New tab page ── */
  .new-tab-page {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .new-tab-page::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,111,255,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .void-logo {
    font-family: 'Space Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    user-select: none;
  }

  .void-sub {
    font-size: 14px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .new-tab-input-wrap {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0 18px;
    height: 52px;
    gap: 12px;
    width: min(480px, 90vw);
    transition: border-color 0.2s;
  }
  .new-tab-input-wrap:focus-within { border-color: var(--accent); }

  .new-tab-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    caret-color: var(--accent);
  }
  .new-tab-input::placeholder { color: var(--muted); }

  .new-tab-go {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .new-tab-go:hover { background: #9585ff; }

  .quick-links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ql {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 12px 16px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: all 0.15s;
    text-decoration: none;
    color: var(--muted);
    font-size: 11px;
    min-width: 72px;
    user-select: none;
  }
  .ql:hover { background: var(--surface2); border-color: var(--accent); color: var(--text); }
  .ql-icon { font-size: 22px; }

  /* ── Loading bar ── */
  #load-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    z-index: 9999;
    transition: width 0.3s ease, opacity 0.4s;
    opacity: 0;
  }
  #load-bar.active { opacity: 1; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="load-bar"></div>

<div id="shell">
  <div id="tab-strip">
    <!-- tabs injected here -->
    <button id="new-tab-btn" title="New tab">+</button>
  </div>

  <div id="nav-bar">
    <button class="nav-btn" id="back-btn" title="Back" disabled>&#8592;</button>
    <button class="nav-btn" id="fwd-btn" title="Forward" disabled>&#8594;</button>
    <button class="nav-btn" id="reload-btn" title="Reload">&#8635;</button>

    <div id="url-wrap">
      <span id="url-icon">🔒</span>
      <input id="url-input" type="text" placeholder="Enter a URL or search..." autocomplete="off" spellcheck="false" />
    </div>

    <button id="go-btn">Go</button>
  </div>

  <div id="viewport">
    <!-- tab-content panels injected here -->
  </div>
</div>

<script>
  const BLANK_URL = 'about:blank';
  let tabs = [];
  let activeId = null;
  let tabCounter = 0;

  const tabStrip = document.getElementById('tab-strip');
  const newTabBtn = document.getElementById('new-tab-btn');
  const viewport = document.getElementById('viewport');
  const urlInput = document.getElementById('url-input');
  const goBtn = document.getElementById('go-btn');
  const backBtn = document.getElementById('back-btn');
  const fwdBtn = document.getElementById('fwd-btn');
  const reloadBtn = document.getElementById('reload-btn');
  const loadBar = document.getElementById('load-bar');

  // ── Helpers ──
  function normalizeUrl(raw) {
    raw = raw.trim();
    if (!raw) return null;
    if (/^https?:\/\//i.test(raw)) return raw;
    if (/^[a-z0-9-]+\.[a-z]{2,}/i.test(raw)) return 'https://' + raw;
    return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
  }

  function shortTitle(url) {
    try {
      const u = new URL(url);
      return u.hostname.replace(/^www\./, '');
    } catch { return 'new tab'; }
  }

  function animateLoad() {
    loadBar.style.width = '0%';
    loadBar.classList.add('active');
    let w = 0;
    const iv = setInterval(() => {
      w += Math.random() * 15;
      if (w > 90) { clearInterval(iv); return; }
      loadBar.style.width = w + '%';
    }, 120);
    return () => {
      clearInterval(iv);
      loadBar.style.width = '100%';
      setTimeout(() => { loadBar.classList.remove('active'); loadBar.style.width = '0%'; }, 400);
    };
  }

  // ── Tab creation ──
  function createTab(url) {
    const id = ++tabCounter;
    const isBlank = !url;

    const content = document.createElement('div');
    content.className = 'tab-content';
    content.dataset.id = id;

    let iframe = null;

    if (!isBlank) {
      iframe = buildIframe(url);
      content.appendChild(iframe);
    } else {
      content.appendChild(buildNewTabPage(id));
    }

    viewport.appendChild(content);

    const tabEl = document.createElement('div');
    tabEl.className = 'tab';
    tabEl.dataset.id = id;
    tabEl.innerHTML = `<span class="tab-dot"></span><span class="tab-title">${isBlank ? 'new tab' : shortTitle(url)}</span><button class="tab-close" title="Close tab">×</button>`;

    tabEl.addEventListener('click', e => {
      if (e.target.classList.contains('tab-close')) { closeTab(id); return; }
      activateTab(id);
    });

    tabStrip.insertBefore(tabEl, newTabBtn);

    const tabData = { id, url: url || null, el: tabEl, content, iframe };
    tabs.push(tabData);

    activateTab(id);
    return tabData;
  }

  function buildIframe(url) {
    const frame = document.createElement('iframe');
    frame.className = 'tab-iframe';
    frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals');
    frame.src = url;

    const finish = animateLoad();
    frame.addEventListener('load', () => {
      finish();
      // try to grab title
      const tab = tabs.find(t => t.iframe === frame);
      if (tab) {
        try {
          const title = frame.contentDocument?.title;
          if (title) updateTabTitle(tab.id, title);
        } catch {}
      }
    }, { once: true });

    return frame;
  }

  function buildNewTabPage(id) {
    const div = document.createElement('div');
    div.className = 'new-tab-page';
    div.innerHTML = `
      <div class="void-logo">void</div>
      <div class="void-sub">where do you want to go?</div>
      <div class="new-tab-input-wrap">
        <input class="new-tab-input" type="text" placeholder="paste a link or type anything..." autocomplete="off" spellcheck="false" />
        <button class="new-tab-go">→</button>
      </div>
      <div class="quick-links">
        <div class="ql" data-url="https://google.com"><span class="ql-icon">🔍</span>Google</div>
        <div class="ql" data-url="https://youtube.com"><span class="ql-icon">▶</span>YouTube</div>
        <div class="ql" data-url="https://reddit.com"><span class="ql-icon">👾</span>Reddit</div>
        <div class="ql" data-url="https://github.com"><span class="ql-icon">🐙</span>GitHub</div>
        <div class="ql" data-url="https://wikipedia.org"><span class="ql-icon">📚</span>Wikipedia</div>
      </div>
    `;

    const ntInput = div.querySelector('.new-tab-input');
    const ntGo = div.querySelector('.new-tab-go');

    function go() {
      const u = normalizeUrl(ntInput.value);
      if (!u) return;
      navigateTab(id, u);
    }

    ntGo.addEventListener('click', go);
    ntInput.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });

    div.querySelectorAll('.ql').forEach(ql => {
      ql.addEventListener('click', () => navigateTab(id, ql.dataset.url));
    });

    return div;
  }

  function activateTab(id) {
    activeId = id;
    tabs.forEach(t => {
      t.el.classList.toggle('active', t.id === id);
      t.content.classList.toggle('active', t.id === id);
    });
    const tab = tabs.find(t => t.id === id);
    if (tab) {
      urlInput.value = tab.url || '';
      backBtn.disabled = true;
      fwdBtn.disabled = true;
      tab.el.scrollIntoView({ inline: 'nearest' });
    }
  }

  function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    const tab = tabs[idx];
    tab.el.remove();
    tab.content.remove();
    tabs.splice(idx, 1);

    if (tabs.length === 0) { createTab(); return; }
    if (activeId === id) {
      const next = tabs[Math.min(idx, tabs.length - 1)];
      activateTab(next.id);
    }
  }

  function navigateTab(id, url) {
    const tab = tabs.find(t => t.id === id);
    if (!tab) return;

    tab.url = url;
    updateTabTitle(id, shortTitle(url));

    // replace new tab page with iframe
    tab.content.innerHTML = '';
    const frame = buildIframe(url);
    tab.iframe = frame;
    tab.content.appendChild(frame);

    if (activeId === id) urlInput.value = url;
  }

  function updateTabTitle(id, title) {
    const tab = tabs.find(t => t.id === id);
    if (!tab) return;
    const titleEl = tab.el.querySelector('.tab-title');
    if (titleEl) titleEl.textContent = title.length > 20 ? title.slice(0, 18) + '…' : title;
  }

  // ── Nav bar ──
  function navigate() {
    const raw = urlInput.value.trim();
    const url = normalizeUrl(raw);
    if (!url || !activeId) return;
    navigateTab(activeId, url);
  }

  goBtn.addEventListener('click', navigate);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });

  reloadBtn.addEventListener('click', () => {
    const tab = tabs.find(t => t.id === activeId);
    if (tab?.iframe) {
      const finish = animateLoad();
      tab.iframe.src = tab.iframe.src;
      tab.iframe.addEventListener('load', finish, { once: true });
    }
  });

  // ── New tab button ──
  newTabBtn.addEventListener('click', () => createTab());

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); createTab(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); if (activeId) closeTab(activeId); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); urlInput.focus(); urlInput.select(); }
  });

  // ── Init ──
  createTab();
</script>
</body>
</html>
